services:
  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_USER: wpcomp
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-wpcomp_dev}
      POSTGRES_DB: wpcomp
    ports:
      - "5433:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data

volumes:
  pgdata:
